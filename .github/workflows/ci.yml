name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Supersede in-flight runs for the same ref; a newer push makes older runs moot.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.6"
      - name: ruff check
        run: ruff check --output-format github .

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # One Windows leg mirrors the primary development platform; the
        # sandbox image is not built here, so Docker-dependent tests skip
        # and the pure-Python stack is exercised across both operating systems.
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest -q

  integration:
    name: Integration (docker sandbox + langgraph)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with optional extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,langgraph]"
      - name: Build hardened sandbox image
        run: docker build --tag cognitivetree-sandbox:latest cognitivetree/sandbox/image
      - name: Run full suite with live sandbox and LangGraph
        run: python -m pytest -q
